name: CI/CD Pipeline

on:
  push:
    branches:
      - test-sonar
  pull_request:
    branches:
      - main

jobs:
  frontend-build-test:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Step 1: Install Dependencies
      - name: Install Dependencies
        run: |
          cd quolance-ui
          npm install

      # UNCOMMENT WHEN THERE ARE TESTS IN FRONTEND
      # # Step 2: Run Tests
      # - name: Run Tests
      #   run: |
      #     cd quolance-ui
      #     npm test

      # Step 3: Build Frontend Package
      - name: Build Frontend
        run: |
          cd quolance-ui
          npm run build

      - name: SonarCloud Analysis (Frontend)
        uses: SonarSource/sonarcloud-github-action@v1
        with:
          organization: ${{ secrets.SONAR_ORG }}
          token: ${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_SCANNER_OPTS: >
            -Dsonar.projectKey=abdelh17_Quolance
            -Dsonar.sources=quolance-ui/src
            -Dsonar.javascript.lcov.reportPaths=quolance-ui/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/build/**,**/dist/**

  backend-build-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    env:
      MAILPIT_SMTP_PORT: "1025"
      DB_DDL_AUTO: "create"

    steps:
      - uses: actions/checkout@v3

      # Set up JDK for Spring Boot
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # Build and test Spring Boot backend
      - name: Build and Test Spring Boot
        run: |
          cd quolance-api
          ./mvnw clean install
          ./mvnw test

      # Run SonarCloud Analysis (Backend)
      - name: SonarCloud Analysis (Backend)
        uses: SonarSource/sonarcloud-github-action@v1
        with:
          organization: ${{ secrets.SONAR_ORG }}
          token: ${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_SCANNER_OPTS: "-Dsonar.sources=quolance-api/src/main/java"
